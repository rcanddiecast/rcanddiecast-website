<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC & Diecast | Kinetic App Experience</title>
    
    <meta name="description" content="Discover India's ultra-premium collection of 1/10 and 1/24 scale RC crawlers and diecast models.">
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" type="image/x-icon" href="/image/favicon.ico">
    <link href="/output.css" rel="stylesheet">
    
    <style>
        /* Essential base loader and critical animations */
        @keyframes liquidScale {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-liquid {
            animation: liquidScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-surface-950 text-white selection:bg-brand-orange selection:text-white overscroll-none">

    <!-- App Initializer -->
    <div id="loader" class="fixed inset-0 bg-surface-950 z-[9999] flex flex-col justify-center items-center transition-all duration-[1500ms]">
        <h2 class="text-[10px] uppercase tracking-[0.5em] font-bold text-white mb-6">Connecting to Garage</h2>
        <div class="w-48 h-1 bg-surface-900 rounded-full overflow-hidden">
            <div id="loader-bar" class="h-full bg-brand-orange w-0 transition-all duration-[2000ms] ease-out"></div>
        </div>
    </div>

    <!-- The Dynamic Island (App Dock on Mobile) -->
    <nav class="fixed bottom-6 md:bottom-auto md:top-8 left-1/2 -translate-x-1/2 z-50 w-auto px-2 py-2 dynamic-island rounded-[2rem] flex items-center gap-1 md:gap-4 transition-transform hover:scale-105 duration-300">
        <!-- Home Icon -->
        <a href="#kinetic-hero" class="w-12 h-12 md:w-14 md:h-14 rounded-full flex justify-center items-center hover:bg-white/10 transition-colors">
            <svg class="w-5 h-5 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        </a>
        
        <div class="h-8 w-[1px] bg-white/10 mx-1"></div>
        
        <!-- Grid/Showroom Icon -->
        <a href="#bento-showroom" class="w-12 h-12 md:w-14 md:h-14 rounded-full flex justify-center items-center hover:bg-white/10 transition-colors">
            <svg class="w-5 h-5 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        </a>
        
        <div class="h-8 w-[1px] bg-white/10 mx-1"></div>
        
        <!-- Connect / External -->
        <a href="https://www.instagram.com/rcanddiecast/" target="_blank" class="w-12 h-12 md:w-auto md:px-6 rounded-[1.5rem] flex justify-center items-center bg-brand-orange hover:bg-brand-hover text-white transition-colors shadow-[0_0_20px_rgba(255,61,0,0.3)]">
            <svg class="w-5 h-5 md:hidden text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
            <span class="hidden md:block text-[10px] uppercase tracking-[0.2em] font-extrabold text-white">Connect</span>
        </a>
    </nav>

    <main id="smooth-wrapper" class="bg-surface-950">
        <div id="smooth-content">
            
            <!-- 1. Kinetic Hero Slider -->
            <section id="kinetic-hero" class="relative w-full h-[100vh] md:h-[100vh] bg-surface-950 overflow-hidden cursor-grab active:cursor-grabbing">
                <!-- Slides will be injected here -->
                <div id="hero-slider-track" class="w-full h-full relative">
                    <!-- Skeletons temporarily -->
                    <div class="absolute inset-0 bg-surface-900 animate-pulse"></div>
                </div>
                
                <!-- Controls (Dots) -->
                <div class="absolute bottom-[15vh] left-6 md:left-12 z-40 flex items-center gap-3" id="hero-controls">
                    <!-- Dots built via JS -->
                </div>
            </section>

            <!-- 2. Bento Box Showroom -->
            <section id="bento-showroom" class="pt-32 pb-24 bg-surface-950 relative z-20">
                <div class="max-w-[1920px] mx-auto px-6 lg:px-12">
                    
                    <div class="mb-20 text-center animate-liquid">
                        <h2 class="text-[10px] md:text-sm text-brand-orange uppercase tracking-[0.5em] font-extrabold mb-4">Precision Grid</h2>
                        <p class="text-4xl md:text-7xl font-extrabold tracking-tighter text-white">Curated Engineering.</p>
                    </div>

                    <!-- Asymmetric Auto-Flow Grid -->
                    <div id="bento-gallery" class="grid grid-cols-1 md:grid-cols-12 gap-6 grid-flow-row-dense">
                        <!-- Bento Cards Injected Here via API slice(3) -->
                    </div>
                </div>
            </section>

            <!-- 3. Kinetic Marquee Footer -->
            <footer id="kinetic-footer" class="pt-32 pb-48 md:pb-24 border-t border-white/5 bg-surface-950 overflow-hidden relative group">
                <div class="absolute inset-0 bg-app-glass pointer-events-none group-hover:opacity-100 opacity-50 transition-opacity duration-1000"></div>
                
                <div class="text-center relative z-10 animate-liquid">
                    <p class="text-[9px] uppercase tracking-[0.4em] font-bold text-gray-500 mb-6">Partners & Projects</p>
                </div>
                
                <!-- Continuous Marquee Container -->
                <div class="w-full relative z-10 my-12 overflow-hidden" id="marquee-wrapper">
                    <!-- CSS Marquee Track -->
                    <div class="flex whitespace-nowrap w-max animate-marquee items-center" id="marquee-track">
                        <!-- Brand Strings Injected Here by JS -->
                    </div>
                </div>
                
                <!-- Ending Brand Logo -->
                <div class="px-6 lg:px-12 max-w-[1920px] mx-auto pt-16 text-center relative z-10 flex flex-col items-center gap-6">
                    <h3 class="text-4xl md:text-6xl font-extrabold tracking-tighter text-white">RC&D.</h3>
                    <p class="text-[9px] uppercase tracking-[0.3em] font-bold text-gray-600">Pure Scale Automotives</p>
                </div>
            </footer>

        </div>
    </main>

    <!-- Scroll to Top App Button -->
    <button id="scrollToTopBtn" aria-label="Scroll to top" class="fixed right-6 bottom-6 md:right-12 md:bottom-12 z-[100] w-12 h-12 dynamic-island rounded-full flex justify-center items-center hover:bg-white/10 transition-all duration-500 opacity-0 pointer-events-none translate-y-8 shadow-[0_4px_15px_rgba(0,0,0,0.8)]">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>

    <!-- App Dependencies -->
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <script src="/app.js"></script>
</body>
</html>
