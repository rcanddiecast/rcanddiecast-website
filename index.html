            padding-right: 2rem !important;
        }
        .filter-select option { background: #050505; color: #fff; }
        .filter-divider {
            width: 1px;
            background: rgba(255,255,255,0.08);
            align-self: stretch;
            margin: 6px 0;
        }
        /* Range Slider */
        .price-range-wrap { position: relative; }
        input[type=range].price-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range].price-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff3d00;
            border: 2px solid #000;
            box-shadow: 0 0 8px rgba(255,61,0,0.6);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type=range].price-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 14px rgba(255,61,0,0.8);
        }
        input[type=range].price-slider::-moz-range-thumb {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #ff3d00;
            border: 2px solid #000;
            cursor: pointer;
        }
        /* Active filter pill */
        .filter-active-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,61,0,0.15);
            border: 1px solid rgba(255,61,0,0.35);
            color: #ff3d00;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;

            padding: 4px 10px;

            transition: background 0.2s;

        /* Mobile filter sheet */
        #mobile-filter-sheet {
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
        }
        #mobile-filter-sheet.open { pointer-events: all; }
        #mobile-filter-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #mobile-filter-sheet.open #mobile-filter-backdrop { opacity: 1; }
        #mobile-filter-panel {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            background: #050505;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 2rem 2rem 0 0;
            padding: 1.5rem 1.5rem 5rem;
            transform: translateY(100%);

            max-height: 85vh;
            overflow-y: auto;
        }

        .mobile-filter-label {

            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem;

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <p style="font-size:0.9rem; font-weight:800; color:#fff; letter-spacing:-0.02em;">Filters</p>
                <button onclick="closeMobileFilter()" style="background:rgba(255,255,255,0.08); border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; color:rgba(255,255,255,0.6); font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;">×</button>
            </div>

            <!-- Brand -->
            <div style="margin-bottom:1.5rem;">
                <label class="mobile-filter-label">Brand</label>
                <select id="brand-filter-mobile" class="filter-select text-sm font-bold" style="width:100%; padding:0.75rem 2.5rem 0.75rem 1rem;" aria-label="Filter by brand (mobile)">
                    <option value="">All Brands</option>
                </select>
            </div>

            <!-- Sort -->
            <div style="margin-bottom:1.5rem;">
                <label class="mobile-filter-label">Sort by</label>
                <select id="sort-filter-mobile" class="filter-select text-sm font-bold" style="width:100%; padding:0.75rem 2.5rem 0.75rem 1rem;" aria-label="Sort products (mobile)">
                    <option value="">Default</option>
                    <option value="low">Price: Low → High</option>
                    <option value="high">Price: High → Low</option>
                    <option value="az">Name: A → Z</option>
                </select>
            </div>

            <!-- Price Range -->
            <div style="margin-bottom:2rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
                    <label class="mobile-filter-label" style="margin:0;">Price Range</label>
                    <span id="price-display-mobile" style="font-size:11px; font-weight:700; color:#ff3d00;">₹0 – ₹10,000</span>
                </div>
                <div class="price-range-wrap">
                    <input type="range" id="price-min-mobile" class="price-slider" min="0" max="10000" value="0" step="100" aria-label="Minimum price (mobile)">
                    <input type="range" id="price-max-mobile" class="price-slider" style="margin-top:0.75rem;" min="0" max="10000" value="10000" step="100" aria-label="Maximum price (mobile)">
                </div>
            </div>

            <!-- Apply + Clear -->
            <div style="display:flex; gap:0.75rem;">
                <button onclick="clearAllFilters(); closeMobileFilter();" style="flex:1; padding:0.9rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.15em; cursor:pointer;">Clear All</button>
                <button onclick="applyMobileFilters(); closeMobileFilter();" style="flex:1; padding:0.9rem; border-radius:1rem; background:#ff3d00; border:none; color:#fff; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.15em; cursor:pointer; box-shadow:0 0 20px rgba(255,61,0,0.4);">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- Scroll to Top App Button -->
    <button id="scrollToTopBtn" aria-label="Scroll to top" class="fixed right-6 bottom-6 md:right-12 md:bottom-12 z-[100] w-12 h-12 dynamic-island rounded-full flex justify-center items-center hover:bg-white/10 transition-all duration-500 opacity-0 pointer-events-none translate-y-8 shadow-[0_4px_15px_rgba(0,0,0,0.8)]">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>

    <!-- App Dependencies: defer = downloads in parallel, executes in order, never blocks -->
    <script defer src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script defer src="/app.js"></script>
</body>
</html>
