<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RC and Diecast Blog - Expert tips, restoration guides, and top lists for Remote Control and Diecast enthusiasts in 2026.">
    <meta name="keywords" content="RC Cars Blog, Diecast Restorations Guide, Remote Control Maintenance, Traxxas Reviews, FMS News, Scale Model Tips">
    <title>Blog | RC & Diecast</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.ico">
    <link href="/output.css" rel="stylesheet">
</head>
<body class="bg-dark-900 text-gray-200">
    <!-- Header Navigation -->
    <header class="fixed top-0 w-full z-50 glass border-b-0 py-4" id="navbar">
        <div class="container mx-auto px-6 max-w-7xl flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="/image/logo.png" alt="RC & Diecast Logo" class="h-10 w-auto group-hover:scale-105 transition-transform duration-300" onerror="this.src='/image/favicon.ico'">
                <h1 class="font-bold text-xl tracking-wide hidden sm:block">RC<span class="text-brand-orange">&</span>Diecast</h1>
            </a>
            <nav class="hidden md:flex gap-8 items-center text-sm font-medium tracking-wider">
                <a href="index.html#home" class="hover:text-brand-orange transition-colors">HOME</a>
                <a href="index.html#collection" class="hover:text-brand-orange transition-colors">COLLECTION</a>
                <a href="index.html#services" class="hover:text-brand-orange transition-colors">RESTORATION</a>
                <a href="blog.html" class="text-brand-orange transition-colors">BLOG</a>
                <a href="https://www.instagram.com/rcanddiecast/" target="_blank" class="px-5 py-2 rounded-full border border-brand-orange/30 text-brand-orange hover:bg-brand-orange hover:text-white transition-all duration-300">CONTACT</a>
            </nav>
            <button class="md:hidden text-2xl focus:outline-none text-brand-orange" id="mobile-menu-btn">☰</button>
        </div>
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full glass flex-col py-4 items-center gap-6 border-b border-brand-orange/20">
            <a href="index.html#home" class="mobile-link">HOME</a>
            <a href="index.html#collection" class="mobile-link">COLLECTION</a>
            <a href="index.html#services" class="mobile-link">RESTORATION</a>
            <a href="blog.html" class="mobile-link text-brand-orange">BLOG</a>
        </div>
    </header>

    <main class="pt-32 pb-24 min-h-screen relative z-10">
        <div class="container mx-auto px-6 max-w-7xl">
            <div class="text-center max-w-2xl mx-auto mb-16 blog-header">
                <h1 class="text-4xl md:text-6xl font-bold mb-6">The <span class="gradient-text">Garage</span> Journal</h1>
                <p class="text-gray-400 text-lg lg:text-xl font-light">Latest insights, restoration guides, and reviews for the true scale enthusiast.</p>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="blog-grid">
                <!-- Blog posts will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        const blogs = [
            { title: "Top 5 RC Rock Crawlers of 2026", cat: "Reviews", date: "Mar 20, 2026", desc: "A deep dive into the most capable off-road scale rigs of the year, featuring Traxxas and Axial.", img: "/image/trx4m.jpg" },
            { title: "Diecast Restoration: From Rust to Glory", cat: "Restoration", date: "Mar 15, 2026", desc: "Step-by-step guide on how to strip, paint, and detail weathered 1:18 diecast models.", img: "/image/old-img1.jpg" },
            { title: "Understanding Lipo Batteries Safely", cat: "Guide", date: "Feb 28, 2026", desc: "Essential safety tips and charging best practices for high-performance RC basher batteries.", img: "/image/img1.jpg" },
            { title: "Brushless vs Brushed Motors", cat: "Tech", date: "Feb 10, 2026", desc: "What's the difference? And which power system is right for your driving style?", img: "/image/img2.jpg" },
            { title: "FMS Smasher V2: Honest Review", cat: "Reviews", date: "Jan 25, 2026", desc: "Is the new FMS monster truck worth the hype? We tested it to the limits.", img: "/image/img3.jpg" },
            { title: "Weathering Techniques for Scale Realism", cat: "Tutorial", date: "Jan 12, 2026", desc: "How to apply rust, mud, and dust effects to make your scale truck look truly authentic.", img: "/image/img4.jpg" },
            { title: "Upgrading the Traxxas TRX-4M", cat: "Upgrades", date: "Dec 30, 2025", desc: "The ultimate list of brass weights, beadlock wheels, and servo upgrades for the mini crawler.", img: "/image/bronco-wl-toys.jpg" },
            { title: "WL Toys 104001 Debugging common issues", cat: "Repair", date: "Dec 15, 2025", desc: "How to fix steering slop and diff clicking on the popular budget basher.", img: "/image/bronco-wl-toys.jpg" },
            { title: "History of the Land Rover Defender in RC", cat: "History", date: "Nov 22, 2025", desc: "Tracing the legendary Camel Trophy roots back to today's best scale RC models.", img: "/image/hb-toys-16-defender.jpg" },
            { title: "The Best Budget RC Cars Under $100", cat: "Guide", date: "Nov 05, 2025", desc: "You don't need to break the bank to start in the hobby. Here are our top affordable picks.", img: "/image/cxd-d12-mini.jpg" }
        ];

        const grid = document.getElementById('blog-grid');
        blogs.forEach((post, i) => {
            grid.innerHTML += `
                <article class="blog-card glass rounded-2xl overflow-hidden hover:-translate-y-2 transition-transform duration-300 group opacity-0 flex flex-col h-full">
                    <div class="relative h-56 overflow-hidden bg-dark-800">
                        <img src="${post.img}" alt="${post.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out" onerror="this.src='https://images.unsplash.com/photo-1594882645126-14020914d58d?q=80&w=1000'">
                        <div class="absolute top-4 left-4 bg-brand-orange text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">${post.cat}</div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <span class="text-xs text-gray-500 font-mono mb-2 block">${post.date}</span>
                            <h2 class="text-xl font-bold mb-3 leading-snug group-hover:text-brand-orange transition-colors">${post.title}</h2>
                            <p class="text-gray-400 text-sm leading-relaxed mb-6">${post.desc}</p>
                        </div>
                        <a href="javascript:void(0)" class="text-brand-orange font-semibold text-sm uppercase tracking-widest flex items-center gap-2 group/link">
                            Read Article 
                            <span class="group-hover/link:translate-x-1 transition-transform inline-block">→</span>
                        </a>
                    </div>
                </article>
            `;
        });

        document.addEventListener("DOMContentLoaded", () => {
            const lenis = new Lenis({duration: 1.2, smooth: true});
            function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
            requestAnimationFrame(raf);

            gsap.registerPlugin(ScrollTrigger);

            const tl = gsap.timeline();
            tl.from(".blog-header > *", { y: 30, opacity: 0, duration: 0.8, stagger: 0.2, ease: "power3.out" });

            gsap.utils.toArray('.blog-card').forEach((card, i) => {
                gsap.to(card, {
                    scrollTrigger: {
                        trigger: card,
                        start: "top 85%",
                    },
                    y: 0,
                    opacity: 1,
                    duration: 0.8,
                    delay: (i % 3) * 0.1, // Stagger effect per row
                    ease: "power2.out"
                });
            });

            // Mobile menu
            const btn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
                menu.classList.toggle('flex');
            });
        });
    </script>
</body>
</html>
