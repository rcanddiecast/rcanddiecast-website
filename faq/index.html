        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand-orange: #ff3d00;
            --brand-hover: #e53700;
            --surface-950: #000000;
            --surface-900: #050505;
            --surface-850: #0a0a0a;
            --surface-800: #111111;
        }

        html { background: var(--surface-950); }
        body {
            background: var(--surface-950);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* Mobile Scrollbar hiding */
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; -ms-overflow-style: none; }

        /* ===== Loader ===== */
        #faq-loader {
            position: fixed;
            inset: 0;
            background: var(--surface-950);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #faq-loader h2 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-weight: 800;
            color: #fff;
            margin-bottom: 24px;
        }
        #loader-track {
            width: 192px;
            height: 4px;
            background: var(--surface-800);
            border-radius: 99px;
            overflow: hidden;
        }
        #loader-bar {
            height: 100%;
            width: 0%;
            background: var(--brand-orange);
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        /* ===== Dynamic Island Nav ===== */
        .dynamic-island {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background: rgba(0,0,0,0.70);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        nav.site-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 8px;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: auto;
        }
        @media (min-width: 768px) {
            nav.site-nav { bottom: auto; top: 32px; gap: 16px; }
        }
        .nav-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .nav-icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        @media (min-width: 768px) {
            .nav-icon-btn { width: 56px; height: 56px; }
        }
        .nav-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.1); margin: 0 4px; }
        .nav-icon-btn.active { background: rgba(255,61,0,0.15); color: var(--brand-orange); }

        /* ===== Page Header ===== */
        .faq-header {
            padding: 160px 24px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 1024px) { .faq-header { padding: 180px 48px 80px; } }

            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,61,0,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .faq-eyebrow {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--brand-orange);
            margin-bottom: 16px;
        }

            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
            margin-bottom: 24px;

        /* ===== Toolbar (Search & Lang) ===== */

            gap: 16px;
            padding: 0 24px;

            align-items: center;
            padding: 0 16px;
            height: 56px;
            transition: border-color 0.3s, box-shadow 0.3s;

        .search-box:focus-within {
            border-color: rgba(255,61,0,0.4);

        .search-box svg { color: rgba(255,255,255,0.4); flex-shrink: 0; }

            border: none;
            outline: none;
            color: #fff;
            width: 100%;
            height: 100%;
            padding: 0 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }

        /* Lang Toggle */
        .lang-toggle {
            display: flex;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            height: 56px;
            padding: 4px;
            width: 100%;
        }
        .lang-btn {
            background: transparent;
            color: rgba(255,255,255,0.5);
            border: none;
            padding: 0 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }
        .lang-btn.active {
            background: var(--brand-orange);
            color: #fff;
            box-shadow: 0 0 15px rgba(255,61,0,0.3);
        }

        /* ===== FAQ Accordion Area ===== */
        .faq-wrapper {
            max-width: 800px;
            margin: 0 auto 120px;
            padding: 0 24px;
            flex: 1;
        }
        .faq-item {
            background: var(--surface-900);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
        }
        .faq-item:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .faq-item.expanded {
            border-color: rgba(255,61,0,0.3);
            background: rgba(255,61,0,0.03);
        }
        
        .faq-question {
            width: 100%;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            cursor: pointer;
            gap: 16px;
        }
        .faq-question h3 {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 700;
            line-height: 1.4;
        }
        .faq-icon-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: background 0.3s, color 0.3s;
            color: var(--brand-orange);
        }
        .faq-toggle-icon {
            flex-shrink: 0;
            color: rgba(255,255,255,0.4);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s;
        }
        .expanded .faq-toggle-icon {
            transform: rotate(45deg);
            color: var(--brand-orange);
        }

        .faq-answer-col {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .expanded .faq-answer-col { grid-template-rows: 1fr; }
        
        .faq-answer-inner {
            overflow: hidden;
            padding: 0 32px;
            opacity: 0;
            transition: opacity 0.4s ease, padding 0.4s ease;
        }
        .expanded .faq-answer-inner {
            padding: 0 32px 32px;
            opacity: 1;
        }
        .faq-answer-inner p {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 300;
        }
        .faq-category {
            display: inline-block;
            margin-top: 16px;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--brand-orange);
            background: rgba(255,61,0,0.1);
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid rgba(255,61,0,0.2);
        }

        /* Empty state */
        .faq-empty {
            text-align: center;
            padding: 60px 0;
            color: rgba(255,255,255,0.4);
            display: none;
        }

        /* ===== Footer ===== */
        footer.site-footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 80px 24px 160px;
            background: var(--surface-950);
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 768px) { footer.site-footer { padding: 80px 48px 96px; } }
        .footer-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            text-align: center;
        }
        .footer-brand {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
        }
        .footer-tagline {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.25);
        }
        .footer-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-links a {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            transition: color 0.3s;
        }
        .footer-links a:hover, .footer-links a.active { color: var(--brand-orange); }

        /* ===== Scroll to Top ===== */
        #scrollToTopBtn {
            position: fixed;
            right: 24px;
            bottom: 100px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transform: translateY(32px);
            transition: opacity 0.5s, transform 0.5s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        #scrollToTopBtn.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        @media (min-width: 768px) { #scrollToTopBtn { right: 48px; bottom: 48px; } }

        /* Animation */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        // Loading animation progress
        function simulateLoading() {
            const bar = document.getElementById('loader-bar');
            bar.style.width = '40%';
            setTimeout(() => { bar.style.width = '80%'; }, 200);
            setTimeout(() => {
                bar.style.width = '100%';
                const loader = document.getElementById('faq-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 600);
        }

        // Fetch data
        async function fetchFaqs() {
            try {
                const response = await fetch('/data/faqs.json');
                if(!response.ok) throw new Error('Data fetch failed');
                faqsData = await response.json();
                renderFaqs(faqsData);
                generateSEO(faqsData);
                simulateLoading();
            } catch(error) {
                console.error("Error loading FAQs:", error);
                document.getElementById('faq-empty').style.display = 'block';
                document.getElementById('faq-empty').textContent = "Failed to load Support Data.";
                simulateLoading();
            }
        }

        // Generate JSON-LD Schema dynamically ensuring SSR friendly behavior via DOM injection 
        // (Googlebot evaluates dynamically injected structured data seamlessly nowadays)
        function generateSEO(data) {
            const schema = {
                "@context": "https://schema.org",
                "@type": "FAQPage",
                "mainEntity": data.map(item => ({
                    "@type": "Question",
                    "name": item.question,
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": item.answer
                    }
                }))
            };
            document.getElementById('seo-faq-schema').textContent = JSON.stringify(schema);
        }

        // Render FAQ HTML
        function renderFaqs(data) {
            const container = document.getElementById('faq-container');
            const emptyState = document.getElementById('faq-empty');
            
            if(data.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            container.innerHTML = data.map((item, index) => {
                const q = currentLang === 'en' ? item.question : item.questionMl;
                const a = currentLang === 'en' ? item.answer : item.answerMl;
                const cat = currentLang === 'en' ? item.category : item.categoryMl;
                const iconSvg = iconSvgMap[item.icon] || iconSvgMap['support'];

                return `
                    <div class="faq-item" style="animation: fadeInUp 0.4s ease forwards; animation-delay: ${index * 0.1}s; opacity:0; transform:translateY(10px)">
                        <button class="faq-question" aria-expanded="false" aria-controls="faq-ans-${item.id}">
                            <div style="display:flex; align-items:center; gap:16px;">
                                <div class="faq-icon-wrap">${iconSvg}</div>
                                <h3>${q}</h3>
                            </div>
                            <svg class="faq-toggle-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <div class="faq-answer-col" id="faq-ans-${item.id}">
                            <div class="faq-answer-inner">
                                <p>${a}</p>
                                <span class="faq-category">${cat}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            attachAccordionEvents();
        }

        function attachAccordionEvents() {
            const items = document.querySelectorAll('.faq-item');
            items.forEach(item => {
                const btn = item.querySelector('.faq-question');
                btn.addEventListener('click', () => {
                    const isExpanded = item.classList.contains('expanded');
                    
                    // Optional: Close others (accordion style)
                    items.forEach(other => {
                        other.classList.remove('expanded');
                        other.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
                    });

                    if(!isExpanded) {
                        item.classList.add('expanded');
                        btn.setAttribute('aria-expanded', 'true');
                    }
                });
            });
        }

        // UI Text Translation
        function updateUIText() {
            document.getElementById('text-eyebrow').textContent = uiText[currentLang].eyebrow;
            document.getElementById('text-title').textContent = uiText[currentLang].title;
            document.getElementById('faq-search').placeholder = uiText[currentLang].searchPlaceholder;
            document.getElementById('faq-empty').textContent = uiText[currentLang].empty;
        }

        // Listeners for Language
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.getAttribute('data-lang');
                
                updateUIText();
                
                // Re-filter and render
                const query = document.getElementById('faq-search').value.toLowerCase();
                filterData(query);
            });
        });

        // Search functionalilty
        function filterData(query) {
            if(!query.trim()) {
                renderFaqs(faqsData);
                return;
            }
            const filtered = faqsData.filter(item => {
                const qEn = item.question.toLowerCase();
                const aEn = item.answer.toLowerCase();
                const qMl = item.questionMl.toLowerCase();
                const aMl = item.answerMl.toLowerCase();
                const keys = item.keywords.join(' ').toLowerCase();

                return qEn.includes(query) || aEn.includes(query) || qMl.includes(query) || aMl.includes(query) || keys.includes(query);
            });
            renderFaqs(filtered);
        }

        document.getElementById('faq-search').addEventListener('input', (e) => {
            filterData(e.target.value.toLowerCase());
        });

        // Scroll Top Logic
        const scrollTopBtn = document.getElementById('scrollToTopBtn');
        window.addEventListener('scroll', () => {
            if(window.scrollY > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Init
        document.addEventListener('DOMContentLoaded', fetchFaqs);

    </script>
